optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.0001,
  weight_decay : 0.0005
}}

scheduler: {
  type: LambdaLR,
  kwargs: {
  decay_step: 21,
  lr_decay: 0.9,
  lowest_decay: 0.02
}}

dataset : {
  train : { _base_: cfgs/dataset_configs/ToyPCN.yaml,
            others: {subset: 'train'}},
  val : { _base_: cfgs/dataset_configs/ToyPCN.yaml,
            others: {subset: 'val'}},
  test : { _base_: cfgs/dataset_configs/ToyPCN.yaml,
            others: {subset: 'test'}}}

model : {
    NAME: AdaPoinTr,
    num_query: 16,
    num_points: 128,
    center_num: [16, 8],
    global_feature_dim: 128,
    encoder_type: graph,
    decoder_type: fc,
    encoder_config: {
      embed_dim: 64,
      depth: 1,
      num_heads: 4,
      k: 4,
      n_group: 1,
      mlp_ratio: 2.,
      block_style_list: ['attn'],
      combine_style: 'concat',
    },
    decoder_config: {
      embed_dim: 64,
      depth: 1,
      num_heads: 4,
      k: 4,
      n_group: 1,
      mlp_ratio: 2.,
      self_attn_block_style_list: ['attn'],
      self_attn_combine_style: 'concat',
      cross_attn_block_style_list: ['attn'],
      cross_attn_combine_style: 'concat',
    }
}

total_bs : 1
step_per_update : 1
max_epoch : 0

consider_metric: CDL1
