optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.0001,
  weight_decay : 0.0005
}}

scheduler: {
  type: LambdaLR,
  kwargs: {
  decay_step: 21,
  lr_decay: 0.9,
  lowest_decay: 0.02
}}

bnmscheduler: {
  type: Lambda,
  kwargs: {
  decay_step: 21,
  bn_decay: 0.5,
  bn_momentum: 0.9,
  lowest_decay: 0.01
}}

dataset : {
  train : { _base_: cfgs/dataset_configs/Completion3D.yaml,
            others: {subset: 'train', bs: 16}},
  val : { _base_: cfgs/dataset_configs/Completion3D.yaml,
            others: {subset: 'val'}},
  test : { _base_: cfgs/dataset_configs/Completion3D.yaml,
            others: {subset: 'val'}}}

model : {
    NAME: AdaPoinTr,
    num_query: 128,
    num_points: 2048,
    center_num: [128, 64],
    global_feature_dim: 512,
    encoder_type: graph,
    decoder_type: fc,
    encoder_config: {
      embed_dim: 256,
      depth: 4,
      num_heads: 4,
      k: 8,
      n_group: 2,
      mlp_ratio: 2.,
      block_style_list: ['attn-graph', 'attn', 'attn', 'attn'],
      combine_style: 'concat',
    },
    decoder_config: {
      embed_dim: 256,
      depth: 4,
      num_heads: 4,
      k: 8,
      n_group: 2,
      mlp_ratio: 2.,
      self_attn_block_style_list: ['attn-graph', 'attn', 'attn', 'attn'],
      self_attn_combine_style: 'concat',
      cross_attn_block_style_list: ['attn-graph', 'attn', 'attn', 'attn'],
      cross_attn_combine_style: 'concat',
    }
}

total_bs : 16
step_per_update : 1
max_epoch : 300

consider_metric: CDL1
