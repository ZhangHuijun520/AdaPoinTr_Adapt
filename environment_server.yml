name: adapointr-server
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - pytorch=2.1.*
  - torchvision=0.16.*
  - pytorch-cuda=11.8
  - numpy<2
  - h5py
  - matplotlib
  - scipy
  - pyyaml
  - tqdm
  - ninja
  - pip:
      - easydict
      - tensorboardX
      - timm==0.4.5
      - transforms3d
      - einops
      - opencv-python
      - open3d>=0.18
